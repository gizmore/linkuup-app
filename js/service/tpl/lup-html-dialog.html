<md-dialog aria-label="{{data.title}}">
  <form ng-cloak>

    <md-toolbar>
      <div class="md-toolbar-tools">
        <h2>{{data.title}}</h2>
        <span flex></span>
        <md-button class="md-icon-button" ng-click="cancel()">
          <i class="material-icons">close</i>
        </md-button>
      </div>
    </md-toolbar>

    <md-dialog-content>
      <div class="md-dialog-content" compile="data.body">
      </div>
    </md-dialog-content>

    <md-dialog-actions layout="row">
      <md-button ng-click="cancel()">{{'OK'|translate}}</md-button>
    </md-dialog-actions>

  </form>
</md-dialog>
