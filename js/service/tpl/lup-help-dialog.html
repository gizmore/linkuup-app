<md-dialog aria-label="Help">
  <form ng-cloak>

    <md-toolbar>
      <div class="md-toolbar-tools">
        <h2>Hilfe</h2>
        <span flex></span>
        <md-button class="md-icon-button" ng-click="cancel()">
          <i class="material-icons">close</i>
        </md-button>
      </div>
    </md-toolbar>

    <md-dialog-content>
      <div class="md-dialog-content" compile="data.html">
      </div>
    </md-dialog-content>

    <md-dialog-actions layout="row">
      <md-button ng-click="cancel()">Später</md-button>
      <md-button ng-click="ok()">Verstanden</md-button>
    </md-dialog-actions>
    
  </form>
</md-dialog>
