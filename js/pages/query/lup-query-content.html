<md-content flex layout="column">

  <div
   class="chat-msgs md-padding"
   style="overflow: scroll;"
   flex id="lup-query-list-{{data.chat.id()}}">
	<div class="msgline">
		<div ng-repeat="msg in data.chat.messages" class="lup-msg"
		 in-view="$inview&&onMessageRead(msg)"
		 ng-class="{'lup-own-msg':msg.isOwnMessage(), 'lup-notification-unread':!msg.readMyself()}">
		  <div class="head">
			  <p class="msg">
				  <span class="name">{{msg.fromUser().displayName()}}</span>
				  <span class="time">{{msg.sent()|msgDate}}</span>
				  <span class="message"><span class="messager-inner">{{msg.text()}}</span>
				  <lup-msg-state message="msg"></lup-msg-state>
				  <lup-avatar
                   ng-user="msg.fromUser()"
                   ng-click="gotoProfile(msg.fromUser())"></lup-avatar>
			  </p>
		  </div>
		</div>
    </div>
  </div>
  
  <div class="chatbottom">
	<div class="chat-input">
		<input type="text" ng-model="data.message" ng-enter="sendMessage()" />
	</div>
	<div class="chat-button">
		<button ng-click="sendMessage()" class="sendbutton"></button>
	</div>
  </div>

</md-content>

<script type="text/javascript">
	jQuery(document).ready(function(){
		jQuery('.chatbottom input').keyup(function(){
			if(!jQuery.trim(this.value).length) {
				jQuery('.chatbottom button').removeClass('sendmessage');
			}else{
				jQuery('.chatbottom button').addClass('sendmessage');	
			}
		});	
		jQuery('.chat-msgs').bind('DOMNodeInserted DOMNodeRemoved', function() {
			jQuery('.chat-msgs').scrollTop(1000000);
		});
	});
</script>
