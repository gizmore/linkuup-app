<section class="nearby" layout="row" flex ng-cloak>

	<ng-include class="left-sidebar" src="'js/pages/sidenav/lup-sidenav.html?v='+V"></ng-include>

	<md-content class="greybg" flex>
	
		<ng-include src="'js/pages/locations/header-bar-locations.html?v='+V"></ng-include>
		
		<div class="search-input-wrap">
			<input
			type="text" class="search-input" placeholder="{{'SEARCH_FOR_LOCATIONS'|translate}}"
			ng-keyup="searchLocation(data.searchvalue)" ng-model="data.searchvalue" />
		</div>

		<div class="slickit" layout="column" flex>
			<div ng-repeat="room in data.rooms" class="lup-room-slide-outer" ng-class="{'lup-hidden-slide':filteredRoom(room)}">
	
				<div id="room{{room.id()}}" class="lup-room-slide" flex layout-fill layout="column">
					<div class="roominfo">
						<div ng-click="maybeGotoRoom(room)">
							<div class="room-image" style="background-image:url({{room.image()}})"></div>
						</div>
						
						<!--<span class="categoryicon" ng-bind-html="room.categoryIcon()"></span>-->
						<div class="roomhead">
							<div class="roomname">
								<span>{{room.name()}}</span>
							</div>
						</div>
						<div class="distrat">
							<div class="rating">
								<p style="color: #EE9A00">
									<jk-rating-stars read-only="true" max-rating="5"
										rating="room.rating()"></jk-rating-stars>
								</p>
							</div>
							<div class="distance" ng-if="room.showDistance()">
								<p><a ng-href="{{mapsHref(room)}}" target="_blank" title="{{'NAVIGATE_TO_THIS_PLACE'|translate}}">
								<span
								 translate="ROOM_DISTANCE"
								 translate-value-distance="{{room.distance()}}"></span>
								</a></p>
							</div>
						</div>
						<div class="info room-user-preview">
							<lup-avatar
							 ng-repeat="user in sortedVisitors(room) | limitTo: 4"
							 ng-click="gotoProfile(user)"
							 ng-user="user"></lup-avatar>
							
							<span class="more-users" ng-if="room.USERS.length>4" ng-click="gotoVisitors(room)">
							  <b>+ {{room.USERS.length - 4}}</b>
							</span>
						
						</div>
					</div>

					<section class="chatbutton" layout="column">
						
<!-- 						<div class="gotoroom" ng-click="gotoRoom(room)"></div> -->
					
						<md-button
						 style="background:#252525"
						 class="md-raised md-primary inactive"
						 ng-if="!room.inChatRange()">{{'CHAT_TOO_FAR'|translate}}</md-button>
				
						<md-button
						 style="
						 background: rgb(76,76,76); /* Old browsers */
background: -moz-linear-gradient(top, rgba(76,76,76,1) 0%, rgba(89,89,89,1) 13%, rgba(102,102,102,1) 22%, rgba(71,71,71,1) 34%, rgba(44,44,44,1) 46%, rgba(17,17,17,1) 60%, rgba(0,0,0,1) 66%, rgba(43,43,43,1) 85%, rgba(28,28,28,1) 91%, rgba(19,19,19,1) 92%); /* FF3.6-15 */
background: -webkit-linear-gradient(top, rgba(76,76,76,1) 0%,rgba(89,89,89,1) 13%,rgba(102,102,102,1) 22%,rgba(71,71,71,1) 34%,rgba(44,44,44,1) 46%,rgba(17,17,17,1) 60%,rgba(0,0,0,1) 66%,rgba(43,43,43,1) 85%,rgba(28,28,28,1) 91%,rgba(19,19,19,1) 92%); /* Chrome10-25,Safari5.1-6 */
background: linear-gradient(to bottom, rgba(76,76,76,1) 0%,rgba(89,89,89,1) 13%,rgba(102,102,102,1) 22%,rgba(71,71,71,1) 34%,rgba(44,44,44,1) 46%,rgba(17,17,17,1) 60%,rgba(0,0,0,1) 66%,rgba(43,43,43,1) 85%,rgba(28,28,28,1) 91%,rgba(19,19,19,1) 92%); /* W3C, IE10+, FF16+, Chrome26+, Opera12+, Safari7+ */
filter: progid:DXImageTransform.Microsoft.gradient( startColorstr='#4c4c4c', endColorstr='#131313',GradientType=0 ); /* IE6-9 */
						 "
						 class="md-raised md-primary"
						 ng-if="room.inChatRange()"
						 ng-click="gotoChat(room)">{{'JOIN_CHAT'|translate}}</md-button>
						 
					</section>
	
				</div>
	
			</div>
		</div>

	</md-content>

</section>
