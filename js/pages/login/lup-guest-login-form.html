<section layout="column" layout-padding>
  <md-input-container class="md-icon-float md-block">
    <label translate="NICKNAME"></label>
<!--   <md-icon md-svg-src="img/icons/ic_person_24px.svg" class="name"></md-icon> -->
    <input ng-model="data.nickname" type="text">
    <div class="error">{{data.errors.user_guest_name}}</div>
  </md-input-container>
  
  <div class="tos-line" ng-if="ConfigSrvc.tosForced()">
	
	<input type="checkbox" ng-model="data.tos" id="cbx" style="display: none;">
	<label for="cbx" class="check">
	  <svg width="24px" height="24px" viewBox="0 0 18 18">
		<path d="M1,9 L1,3.5 C1,2 2,1 3.5,1 L14.5,1 C16,1 17,2 17,3.5 L17,14.5 C17,16 16,17 14.5,17 L3.5,17 C2,17 1,16 1,14.5 L1,9 Z"></path>
		<polyline points="1 9 7 14 15 4"></polyline>
	  </svg>
	</label>
	<span class="lup-tos-line" compile="data.tosLine"></span>
    <div class="error">{{data.errors.tos}}</div>
  </div> 
  
</section>

<section layout="row" flex>
  <md-button
   aria-label="Login as guest"
   ng-click="loginAsGuest()"
   class="md-primary md-raised login-button"
   translate="CONTINUE_GUEST"></md-button>
</section>

<section layout="row" flex>
  <md-button
   aria-label="Back to login"
   ng-click="gotoLogin()"
   class="md-primary md-raised backtologin"
   translate="BACK_TO_LOGIN"></md-button>
</section>
